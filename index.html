<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal - Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans antialiased">

    <div class="bg-white w-full max-w-md rounded-2xl border border-slate-200 shadow-xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Academic Portal</h1>
            <p class="text-sm text-slate-500 mt-1">Select your workspace identity group to continue</p>
        </div>

        <!-- Role Selector Tabs -->
        <div class="flex border-b border-slate-100 text-sm font-medium">
            <button onclick="switchTab('student')" id="tab-student" class="flex-1 pb-3 text-center border-b-2 border-indigo-600 text-indigo-600 font-bold">Student Log In</button>
            <button onclick="switchTab('teacher')" id="tab-teacher" class="flex-1 pb-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-700">Teacher Control Panel</button>
        </div>

        <!-- Form A: Student Authentication (UPDATED WITH TEACHER NAME CHECK) -->
        <form id="studentForm" onsubmit="handleStudentLogin(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Student Name</label>
                <input type="text" id="studName" required class="w-full px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Teacher's Name</label>
                <input type="text" id="studTeacher" required class="w-full px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Mr. Das">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Password Key</label>
                <input type="password" id="studPass" required class="w-full px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-sm">Login as Student</button>
        </form>

        <!-- Form B: Teacher Authentication -->
        <form id="teacherForm" onsubmit="handleTeacherLogin(event)" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Teacher Identity Name</label>
                <input type="text" id="teachName" required class="w-full px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Mr. Das">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Secure Control Password</label>
                <input type="password" id="teachPass" required class="w-full px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
            </div>
            <p class="text-xs text-slate-400 leading-normal">Note: If your name isn't in the database yet, this login will automatically register your profile and lock this password as your master key.</p>
            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-sm">Enter Control Panel</button>
        </form>
    </div>

    <!-- Live Firebase Integration Engine Layer -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMjISd6EQ574d8Qix4pXvVDriWurPpX-E",
            authDomain: "school-exam-portal.firebaseapp.com",
            projectId: "school-exam-portal",
            storageBucket: "school-exam-portal.firebasestorage.app",
            messagingSenderId: "240212257757",
            appId: "1:240212257757:web:fdb7ff48d25b85a1dd2434",
            measurementId: "G-7VBY7P1JPH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Layout Tab Switcher Logic
        function switchTab(role) {
            const isStudent = role === 'student';
            document.getElementById('studentForm').classList.toggle('hidden', !isStudent);
            document.getElementById('teacherForm').classList.toggle('hidden', isStudent);
            
            document.getElementById('tab-student').className = isStudent 
                ? "flex-1 pb-3 text-center border-b-2 border-indigo-600 text-indigo-600 font-bold" 
                : "flex-1 pb-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-700";
            
            document.getElementById('tab-teacher').className = !isStudent 
                ? "flex-1 pb-3 text-center border-b-2 border-indigo-600 text-indigo-600 font-bold" 
                : "flex-1 pb-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-700";
        }

        // Live Student Authentication Check (VERIFIES STUDENT, TEACHER, AND KEY)
        async function handleStudentLogin(e) {
            e.preventDefault();
            const name = document.getElementById('studName').value.trim();
            const teacherName = document.getElementById('studTeacher').value.trim();
            const pass = document.getElementById('studPass').value;

            try {
                const querySnapshot = await getDocs(collection(db, "portal_students"));
                let matched = null;

                querySnapshot.forEach((doc) => {
                    const studentData = doc.data();
                    // Check student name, password, AND teacher name allocations simultaneously
                    if (
                        studentData.name.toLowerCase() === name.toLowerCase() && 
                        studentData.password === pass &&
                        studentData.teacher.toLowerCase() === teacherName.toLowerCase()
                    ) {
                        matched = studentData;
                    }
                });

                if (matched) {
                    localStorage.setItem('activeStudent', JSON.stringify(matched));
                    window.location.href = 'student/dashboard.html';
                } else {
                    alert('Invalid verification profile. Double check Student Name, Teacher Workspace Identity, and Password Key.');
                }
            } catch (error) {
                console.error(error);
                alert("Cloud database sync failure.");
            }
        }

        // Live Secure Teacher Authentication
        async function handleTeacherLogin(e) {
            e.preventDefault();
            const name = document.getElementById('teachName').value.trim();
            const pass = document.getElementById('teachPass').value;

            try {
                const querySnapshot = await getDocs(collection(db, "portal_teachers"));
                let matchedTeacher = null;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.name.toLowerCase() === name.toLowerCase()) {
                        matchedTeacher = data;
                    }
                });

                if (matchedTeacher) {
                    if (matchedTeacher.password === pass) {
                        localStorage.setItem('activeTeacher', matchedTeacher.name);
                        window.location.href = 'teacher/dashboard.html';
                    } else {
                        alert('Incorrect secure control password for this teacher identity.');
                    }
                } else {
                    await addDoc(collection(db, "portal_teachers"), {
                        name: name,
                        password: pass
                    });
                    localStorage.setItem('activeTeacher', name);
                    alert(`Secure workspace created for ${name}! Your password key has been locked inside the cloud.`);
                    window.location.href = 'teacher/dashboard.html';
                }
            } catch (error) {
                console.error(error);
                alert("Cloud database sync failure.");
            }
        }

        window.switchTab = switchTab;
        window.handleStudentLogin = handleStudentLogin;
        window.handleTeacherLogin = handleTeacherLogin;
    </script>
</body>
</html>
