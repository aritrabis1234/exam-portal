<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Desk - Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div>
                <h1 class="text-base font-bold text-slate-900">Student Workspace Desk</h1>
                <p class="text-xs text-slate-500" id="studentMeta">Verifying Credentials...</p>
            </div>
            <button onclick="logout()" class="text-sm font-medium text-red-600 hover:text-red-700 bg-red-50 px-4 py-2 rounded-lg transition-colors">Exit Workspace</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h2 class="text-lg font-black text-slate-900 mb-1">Your Evaluation Schedule</h2>
            <p class="text-sm text-slate-500 mb-4">Assigned tests matching your Class and Medium profiles.</p>
            
            <div id="examGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMjISd6EQ574d8Qix4pXvVDriWurPpX-E",
            authDomain: "school-exam-portal.firebaseapp.com",
            projectId: "school-exam-portal",
            storageBucket: "school-exam-portal.firebasestorage.app",
            messagingSenderId: "240212257757",
            appId: "1:240212257757:web:fdb7ff48d25b85a1dd2434",
            measurementId: "G-7VBY7P1JPH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const student = JSON.parse(localStorage.getItem('activeStudent'));
        if (!student) window.location.href = '../index.html';

        document.getElementById('studentMeta').innerText = `${student.name} • ${student.class} (${student.medium} Medium) • Instructor: ${student.teacher}`;

        async function renderAvailableExams() {
            const grid = document.getElementById('examGrid');
            grid.innerHTML = '<div class="col-span-2 text-center py-6 text-slate-400 text-xs">Syncing test schedules from cloud database...</div>';
            
            try {
                // Fetch completed marks sheets
                const resultsSnap = await getDocs(collection(db, "portal_results"));
                const completedRecords = [];
                resultsSnap.forEach(d => {
                    const data = d.data();
                    if(data.studentName === student.name) completedRecords.push(data);
                });

                // Fetch published exam schedules
                const examsSnap = await getDocs(collection(db, "portal_exams"));
                grid.innerHTML = '';
                let outputCount = 0;

                examsSnap.forEach(docObj => {
                    const e = docObj.data();
                    
                    // Enforce structural rules
                    if (e.teacher === student.teacher && e.class === student.class && e.medium === student.medium) {
                        outputCount++;
                        const completed = completedRecords.find(r => r.examId === e.id);
                        let actionMarkup = '';

                        if (completed) {
                            actionMarkup = `
                                <div class="text-right">
                                    <span class="block text-[10px] font-bold uppercase text-emerald-600 tracking-wide mb-0.5">✓ Submitted</span>
                                    <span class="text-xs font-mono font-black text-slate-700">Tally: ${completed.score}/${completed.maxScore}</span>
                                </div>`;
                        } else {
                            actionMarkup = `
                                <button onclick="launchExam('${e.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs px-4 py-2 rounded-xl shadow-sm transition-all">
                                    Enter Room
                                </button>`;
                        }

                        grid.innerHTML += `
                            <div class="p-5 border border-slate-100 rounded-xl bg-slate-50/50 flex items-center justify-between hover:border-slate-200 transition-all">
                                <div>
                                    <h3 class="font-bold text-slate-900 text-sm">${e.title}</h3>
                                    <p class="text-[11px] text-slate-400 mt-0.5">${e.questions.length} Items • 60s/Item Limit</p>
                                </div>
                                ${actionMarkup}
                            </div>`;
                    }
                });

                if (outputCount === 0) {
                    grid.innerHTML = '<div class="col-span-2 text-center py-12 text-slate-400 text-sm">No exam structures mapped to your configurations yet.</div>';
                }

            } catch (err) { console.error(err); }
        }

        function launchExam(id) {
            localStorage.setItem('activeExamId', id);
            window.location.href = 'exam.html';
        }

        function logout() { localStorage.removeItem('activeStudent'); window.location.href = '../index.html'; }

        window.launchExam = launchExam;
        window.logout = logout;
        renderAvailableExams();
    </script>
</body>
</html>
