<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Asset Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="dashboard.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">&larr; Back to Dashboard</a>
                <h1 class="text-lg font-bold text-slate-900 border-l border-slate-200 pl-4">Portal Configuration</h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <div>
                <h2 class="text-base font-bold text-slate-900">Active Mock Papers Bank</h2>
                <p class="text-xs text-slate-400">Review or permanently delete published exam papers from the cloud.</p>
            </div>
            <div id="examsManagementList" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
                </div>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <div>
                <h2 class="text-base font-bold text-slate-900">Registered Student Accounts</h2>
                <p class="text-xs text-slate-400">Manage student profiles. Deleting an account revokes their portal login instantly.</p>
            </div>
            <div id="studentsManagementList" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
                </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMjISd6EQ574d8Qix4pXvVDriWurPpX-E",
            authDomain: "school-exam-portal.firebaseapp.com",
            projectId: "school-exam-portal",
            storageBucket: "school-exam-portal.firebasestorage.app",
            messagingSenderId: "240212257757",
            appId: "1:240212257757:web:fdb7ff48d25b85a1dd2434",
            measurementId: "G-7VBY7P1JPH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const teacher = localStorage.getItem('activeTeacher');
        if (!teacher) window.location.href = '../index.html';

        // 1. Fetch and Render Live Active Exams
        async function loadExamsManager() {
            const container = document.getElementById('examsManagementList');
            container.innerHTML = '<p class="text-xs text-slate-400">Syncing papers bank...</p>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "portal_exams"));
                container.innerHTML = '';
                let count = 0;

                querySnapshot.forEach((documentObject) => {
                    const exam = documentObject.data();
                    if (exam.teacher === teacher) {
                        count++;
                        container.innerHTML += `
                            <div class="p-4 border border-slate-100 rounded-xl bg-slate-50/50 flex items-center justify-between">
                                <div>
                                    <h4 class="font-bold text-slate-900 text-xs">${exam.title}</h4>
                                    <p class="text-[10px] text-slate-400 mt-0.5">${exam.class} • ${exam.medium} Medium • ${exam.questions.length} Qs</p>
                                </div>
                                <button onclick="deleteAsset('portal_exams', '${documentObject.id}', 'Exam')" class="text-[11px] font-medium text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors">Delete</button>
                            </div>`;
                    }
                });

                if (count === 0) container.innerHTML = '<p class="text-xs text-slate-400 py-4">No published exam papers found.</p>';
            } catch (err) { console.error(err); }
        }

        // 2. Fetch and Render Live Registered Students
        async function loadStudentsManager() {
            const container = document.getElementById('studentsManagementList');
            container.innerHTML = '<p class="text-xs text-slate-400">Syncing student roster...</p>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "portal_students"));
                container.innerHTML = '';
                let count = 0;

                querySnapshot.forEach((documentObject) => {
                    const student = documentObject.data();
                    if (student.teacher === teacher) {
                        count++;
                        container.innerHTML += `
                            <div class="p-4 border border-slate-100 rounded-xl bg-slate-50/50 flex items-center justify-between">
                                <div>
                                    <h4 class="font-bold text-slate-900 text-xs">${student.name}</h4>
                                    <p class="text-[10px] text-slate-400 mt-0.5">${student.class} (${student.medium}) • Key: <span class="font-mono bg-slate-200/60 px-1 rounded">${student.password}</span></p>
                                </div>
                                <button onclick="deleteAsset('portal_students', '${documentObject.id}', 'Student Account')" class="text-[11px] font-medium text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors">Remove</button>
                            </div>`;
                    }
                });

                if (count === 0) container.innerHTML = '<p class="text-xs text-slate-400 py-4">No registered student profiles found.</p>';
            } catch (err) { console.error(err); }
        }

        // Global Delete Handlers
        async function deleteAsset(collectionName, docId, typeLabel) {
            if (confirm(`Are you absolutely sure you want to permanently delete this ${typeLabel}? This action cannot be undone.`)) {
                try {
                    await deleteDoc(doc(db, collectionName, docId));
                    alert(`${typeLabel} wiped clean from cloud memory.`);
                    loadExamsManager();
                    loadStudentsManager();
                } catch (err) { alert("Failed to delete resource from database."); }
            }
        }

        window.deleteAsset = deleteAsset;
        
        // Initial Trigger
        loadExamsManager();
        loadStudentsManager();
    </script>
</body>
</html>
