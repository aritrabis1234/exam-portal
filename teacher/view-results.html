<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard & Integrity Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="dashboard.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700">&larr; Dashboard</a>
                <h1 class="text-lg font-bold text-slate-900 border-l border-slate-200 pl-4">Scoreboard Logs</h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                <div>
                    <h2 class="text-base font-bold text-slate-900">Student Performance Log Items</h2>
                    <p class="text-xs text-slate-500">Tracks scores and automatic anti-cheat metrics live from the cloud.</p>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-xs font-semibold text-slate-500 border-b border-slate-100 uppercase tracking-wider">
                            <th class="p-4">Student</th>
                            <th class="p-4">Exam Set Title</th>
                            <th class="p-4">Score Obtained</th>
                            <th class="p-4">Anti-Cheat Metrics</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody" class="text-sm text-slate-600 divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMjISd6EQ574d8Qix4pXvVDriWurPpX-E",
            authDomain: "school-exam-portal.firebaseapp.com",
            projectId: "school-exam-portal",
            storageBucket: "school-exam-portal.firebasestorage.app",
            messagingSenderId: "240212257757",
            appId: "1:240212257757:web:fdb7ff48d25b85a1dd2434",
            measurementId: "G-7VBY7P1JPH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const teacher = localStorage.getItem('activeTeacher');
        if (!teacher) window.location.href = '../index.html';

        async function loadResults() {
            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400 text-xs">Querying Cloud Records...</td></tr>';

            try {
                const querySnapshot = await getDocs(collection(db, "portal_results"));
                tbody.innerHTML = '';
                let matchCount = 0;

                querySnapshot.forEach((documentObject) => {
                    const r = documentObject.data();
                    if (r.teacherName === teacher) {
                        matchCount++;
                        const badge = r.violations > 0 
                            ? `<span class="px-2.5 py-1 rounded-md text-xs font-bold bg-red-50 text-red-700 border border-red-100">${r.violations} Screen Breach(es)</span>`
                            : `<span class="px-2.5 py-1 rounded-md text-xs font-bold bg-emerald-50 text-emerald-700 border border-emerald-100">No Violations</span>`;

                        tbody.innerHTML += `
                            <tr class="hover:bg-slate-50/50 transition-colors">
                                <td class="p-4 font-semibold text-slate-900">${r.studentName}</td>
                                <td class="p-4 text-slate-500">${r.examTitle}</td>
                                <td class="p-4 font-mono font-bold text-indigo-600">${r.score} / ${r.maxScore}</td>
                                <td class="p-4">${badge}</td>
                                <td class="p-4 text-right">
                                    <button onclick="unlockRetake('${documentObject.id}')" class="text-xs font-medium text-amber-600 bg-amber-50 hover:bg-amber-100 px-2.5 py-1.5 rounded-lg border border-amber-200 transition-colors">Unlock Retake</button>
                                </td>
                            </tr>`;
                    }
                });

                if (matchCount === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400 text-xs">No metrics registered from active submissions.</td></tr>';
                }
            } catch (err) { console.error(err); }
        }

        async function unlockRetake(docId) {
            if(confirm("Allow retake? This clears this entry from the database.")){
                try {
                    await deleteDoc(doc(db, "portal_results", docId));
                    loadResults();
                } catch(err) { alert("Error clearing data."); }
            }
        }

        window.unlockRetake = unlockRetake;
        loadResults();
    </script>
</body>
</html>
